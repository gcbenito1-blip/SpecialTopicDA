<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Dashboard Activity 1</title>
</head>

<body>
    <style>
        body {
            font-family: sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .widget {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .controls {
            margin: auto;
            max-width: 1200px;
            margin-bottom: 40px;
        }
    </style>
    <h1></h1>

    <div class="controls">
        <label for="">Start Date</label><input type="date" id="startDate" value="2026-01-01" />
        <label for="">End Date</label><input type="date" id="endDate" value="2026-02-25" />
        <button onclick="updateChart()">Apply Filter</button>
    </div>

    <h1>Activity 1</h1>

    <div class="dashboard-grid">
        <div class="widget">
            <canvas id="myChart"></canvas>
        </div>
    </div>

    <script src="chart.js"></script>
    <script>
        const fullData = [
            { date: "2026-01-05", value: 12 },
            { date: "2026-01-10", value: 15 },
            { date: "2026-01-15", value: 18 },
            { date: "2026-01-20", value: 19 },
            { date: "2026-01-25", value: 21 },
            { date: "2026-01-30", value: 14 },
            { date: "2026-02-05", value: 22 },
            { date: "2026-02-10", value: 13 },
            { date: "2026-02-15", value: 30 },
            { date: "2026-02-20", value: 16 },
            { date: "2026-02-25", value: 25 },
        ];

        const ctx = document.getElementById("myChart").getContext("2d");
        let myChart = new Chart(ctx, {
            type: "bar",
            data: {
                labels: fullData.map((d) => d.date),
                datasets: [
                    {
                        label: "Performance Metrics",
                        data: fullData.map((d) => d.value),
                        backgroundColor: "skyblue",
                    },
                ],
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: true },
                },
            },
        });

        function updateChart() {
            const start = document.getElementById("startDate").value;
            const end = document.getElementById("endDate").value;

            const filtered = fullData.filter(
                (item) => item.date >= start && item.date <= end,
            );

            myChart.data.labels = filtered.map((item) => item.date);
            myChart.data.datasets[0].data = filtered.map((item) => item.value);
            myChart.update();
        }

    </script>
</body>

</html>
